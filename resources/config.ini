[display]
monitor_name =
layout = 5x3
wallpaper =
position = 0,0
scale = 0

[network]
adapter_name =

[storage]
drives =

[board]
board.temp.cpu = CPU
board.fan.cpu = CPU
board.fan.system = System 1

[metrics]
cpu.load = *,%,Load
cpu.clock = 5,GHz,Clock
cpu.ram = *,GB,RAM
gpu.load = *,%,Load
gpu.temp = 100,°C,Temp
gpu.clock = 2600,MHz,Clock
gpu.fan = 3000,RPM,Fan
gpu.fps = 240,FPS,FPS
gpu.vram = *,GB,VRAM
board.temp.cpu = 100,°C,Temp
board.fan.cpu = 3000,RPM,CPU Fan
board.fan.system = 3000,RPM,System Fan
network.upload = *,MB/s,Up
network.download = *,MB/s,Down
storage.read = *,MB/s,Read
storage.write = *,MB/s,Write
drive.activity.read = *,,R
drive.activity.write = *,,W
drive.usage = 100,%,Usage
drive.free = *,GB|TB,Free

[metric_list]
label_width = 82
bar_height = 8
row_gap = 5

[drive_usage_list]
; [label] + label_gap + [R] + rw_gap + [W] + bar_gap + [usage bar] + percent_gap + [%] + [free]
label_gap = 5
activity_width = 10
rw_gap = 4
bar_gap = 12
percent_gap = 10
free_width = 40
bar_height = 10
header_gap = 6
row_gap = 6
activity_segments = 4
activity_segment_gap = 1

[throughput]
header_gap = 1
axis_padding = 2
guide_stroke_width = 1
plot_stroke_width = 2
leader_diameter = 6

[gauge]
outer_padding = 9
ring_thickness = 11
sweep_degrees = 262
segment_count = 33
segment_gap_degrees = 2.2
value_bottom = 20
label_bottom = 48

[text]
bottom_gap = 2

[network_footer]
bottom_gap = 0

[layout_editor]
size_similarity_threshold = 5

[dashboard]
outer_margin = 10
row_gap = 10
column_gap = 10

[card_style]
card_padding = 10
card_radius = 18
card_border = 1
header_icon_size = 22
header_icon_gap = 4
header_content_gap = 0
row_gap = 2
column_gap = 16

[colors]
background_color = #000000FF
foreground_color = #FFFFFFFF
icon_color = #FFFFFFFF
accent_color = #00BFFFFF
peak_ghost_color = #00BFFF60
layout_guide_color = #FF6A00FF
active_edit_color = #FFFF00FF
panel_border_color = #1E2837FF
muted_text_color = #A5B4BEFF
track_color = #2D343AFF
panel_fill_color = #06080BFF
graph_background_color = #0A0C0FFF
graph_axis_color = #505860FF
graph_marker_color = #1C2228FF

[fonts]
title = Segoe UI Semibold,18,600
big = Segoe UI Semibold,38,600
value = Segoe UI Semibold,16,600
label = Segoe UI,15,400
text = Segoe UI,15,400
small = Segoe UI,13,400
footer = Segoe UI,13,400
clock_time = Segoe UI Semibold,43,600
clock_date = Segoe UI Semibold,17,600

[layout.5x3]
; 5" screen has 187 PPI and 384k px^2 of space
description = 5" 800x480 landscape
window = 800,480
cards = rows(columns:484(cpu,gpu),columns:416(network:370,storage:880,time:270))

[layout.3x5]
description = 5" 480x800 portrait
window = 480,800
cards = rows(cpu:481,gpu:413,columns:304(storage_throughput,network),columns:302(storage_usage:2,time))

[layout.4x1]
; 9" screen has 217 PPI, here it is sized to 360k px^2 of space
description = 9" 1920x480 screen
window = 1200,300
cards = columns(cpu:746,gpu:746,rows:828(columns:298(network,storage_throughput),columns:242(storage_usage:516,time:238)))

[card.cpu]
title = CPU
icon = cpu
layout = rows(text(cpu.name), columns(gauge:5(cpu.load), metric_list:7(cpu.ram,board.temp.cpu,cpu.clock,board.fan.cpu,board.fan.system)))

[card.gpu]
title = GPU
icon = gpu
layout = rows(text(gpu.name), columns(gauge:5(gpu.load), metric_list:7(gpu.vram,gpu.temp,gpu.clock,gpu.fan,gpu.fps)))

[card.network]
title = Network
icon = network
layout = rows(throughput:4(network.upload), throughput:4(network.download), network_footer)

[card.storage]
title = Storage
icon = storage
layout = columns(storage_throughput:330,storage_usage:478)

[card.storage_throughput]
title = Storage
icon = storage
layout = rows(throughput:4(storage.read), throughput:4(storage.write), vertical_spacer(network_footer))

[card.storage_usage]
layout = rows(drive_usage_list, vertical_spring)

[card.time]
title = Time
icon = time
layout = rows(vertical_spring, clock_time, clock_date, vertical_spring)
