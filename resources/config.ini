[display]
monitor_name =
position = 0,0

[network]
adapter_name =

[metric_scales]
cpu_clock_ghz = 5.0
gpu_temperature_c = 100
gpu_clock_mhz = 2600
gpu_fan_rpm = 3000
board_temperature_c = 100
board_fan_rpm = 3000

[metric_list]
label_width = 74
value_gap = 8
bar_height = 6
vertical_gap = 6

[drive_usage_list]
free_width = 72
bar_gap = 8
value_gap = 10
bar_height = 8
vertical_gap = 6
label_padding = 4
percent_padding = 4

[throughput]
header_gap = 2
graph_height = 41
value_padding = 2
label_padding = 4
axis_padding = 6
scale_label_padding = 4
scale_label_min_height = 14
guide_stroke_width = 1
plot_stroke_width = 2
leader_diameter = 6

[gauge]
preferred_size = 120
outer_padding = 18
min_radius = 20
stroke_width = 10
text_half_width = 42
value_top = 28
value_bottom = 18
label_top = 18
label_bottom = 42

[text]
preferred_padding = 2

[network_footer]
preferred_padding = 2

[clock_time]
padding = 8

[clock_date]
padding = 6

[layout]
window = 800,480
outer_margin = 10
row_gap = 10
card_gap = 10
card_padding = 10
card_radius = 18
card_border = 1
header = 20,18,6
content_gap = 4
column_gap = 16
widget_line_gap = 8

cards = rows(columns:3(cpu,gpu), columns:2(network:4,storage:9,time:3))

background_color = #000000
foreground_color = #FFFFFF
accent_color = #00BFFF
panel_border_color = #EBEBEB
muted_text_color = #A5B4BE
track_color = #2D343A
panel_fill_color = #06080B
graph_background_color = #0A0C0F
graph_grid_color = #2A3036
graph_axis_color = #505860
graph_marker_color = #1C2228

font.title = Segoe UI Semibold,18,700
font.big = Segoe UI Semibold,40,700
font.value = Segoe UI Semibold,17,700
font.label = Segoe UI,15,400
font.small = Segoe UI,12,400

[card.cpu]
title = CPU
icon = cpu
layout = stack(text(cpu.name), columns:7(gauge:5(cpu.load), metric_list:7(cpu.ram,board.temp.CPU=Temp,cpu.clock,board.fan.CPU,board.fan.System 1=System Fan)))

[card.gpu]
title = GPU
icon = gpu
layout = stack(text(gpu.name), columns:7(gauge:5(gpu.load), metric_list:7(gpu.vram,gpu.temp,gpu.clock,gpu.fan)))

[card.network]
title = Network
icon = network
layout = stack(throughput:4(network.upload), throughput:4(network.download), network_footer)

[card.storage]
title = Storage
icon = storage
layout = columns(stack:5(throughput:4(storage.read), throughput:4(storage.write), spacer), stack_top:7(drive_usage_list(C,D,E)))

[card.time]
title = Time
icon = time
layout = center(clock_time:5, clock_date:2)
