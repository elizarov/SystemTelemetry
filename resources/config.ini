[display]
monitor_name =
position = 0,0

[network]
adapter_name =

[layout]
window = 800,480
outer_margin = 10
row_gap = 10
card_gap = 10
card_padding = 10
card_radius = 18
card_border = 1
header = 20,18,6
content_gap = 4
column_gap = 16
metric_label_width = 74
metric_value_gap = 8
metric_bar_height = 4
metric_vertical_gap = 6
widget_line_gap = 8
drive_free_width = 72
drive_bar_gap = 8
drive_value_gap = 10
drive_bar_height = 8
drive_vertical_gap = 6
throughput_header_gap = 2
throughput_graph_height = 41
gauge_preferred_size = 120
text_preferred_padding = 2
footer_preferred_padding = 2
clock_time_padding = 8
clock_date_padding = 6
throughput_value_padding = 2
throughput_label_padding = 4
throughput_axis_padding = 6
drive_label_padding = 4
drive_percent_padding = 4
graph_label_padding = 4
graph_label_min_height = 14
graph_stroke_width = 1
graph_plot_stroke_width = 2
gauge_outer_padding = 18
gauge_min_radius = 20
gauge_stroke_width = 10
gauge_text_half_width = 42
gauge_value_top = 28
gauge_value_bottom = 18
gauge_label_top = 18
gauge_label_bottom = 42

cards = rows(columns:3(cpu,gpu), columns:2(network:4,storage:9,time:3))

background_color = #000000
foreground_color = #FFFFFF
accent_color = #00BFFF
panel_border_color = #EBEBEB
muted_text_color = #A5B4BE
track_color = #2D343A
panel_fill_color = #06080B
graph_background_color = #0A0C0F
graph_grid_color = #2A3036
graph_axis_color = #505860
graph_marker_color = #1C2228

font.title = Segoe UI Semibold,18,700
font.big = Segoe UI Semibold,40,700
font.value = Segoe UI Semibold,17,700
font.label = Segoe UI,15,400
font.small = Segoe UI,12,400

[card.cpu]
title = CPU
icon = cpu
layout = stack(text(cpu.name), columns:7(gauge:5(cpu.load), metric_list:7(cpu.ram,board.temp.CPU=Temp,cpu.clock,board.fan.CPU,board.fan.System 1=System Fan)))

[card.gpu]
title = GPU
icon = gpu
layout = stack(text(gpu.name), columns:7(gauge:5(gpu.load), metric_list:7(gpu.vram,gpu.temp,gpu.clock,gpu.fan)))

[card.network]
title = Network
icon = network
layout = stack(throughput:4(network.upload), throughput:4(network.download), network_footer)

[card.storage]
title = Storage
icon = storage
layout = columns(stack:5(throughput:4(storage.read), throughput:4(storage.write), spacer), stack_top:7(drive_usage_list(C,D,E)))

[card.time]
title = Time
icon = time
layout = center(clock_time:5, clock_date:2)
