[display]
monitor_name =
layout = 5x3
wallpaper =
position = 0,0
scale = 0

[network]
adapter_name =

[storage]
drives =

[board]
board.temp.cpu = CPU
board.fan.cpu = CPU
board.fan.system = System 1

[metric_scales]
cpu_clock_ghz = 5.0
gpu_temperature_c = 100
gpu_clock_mhz = 2600
gpu_fan_rpm = 3000
board_temperature_c = 100
board_fan_rpm = 3000

[metric_list]
label_width = 82
bar_height = 6
vertical_gap = 3

[drive_usage_list]
; [label] + label_gap + [R] + rw_gap + [W] + bar_gap + [usage bar] + percent_gap + [%] + [free]
label_gap = 5
activity_width = 10
rw_gap = 4
bar_gap = 12
percent_gap = 10
free_width = 40
bar_height = 10
header_gap = 6
row_gap = 6
activity_segments = 4
activity_segment_gap = 1

[throughput]
header_gap = 1
axis_padding = 2
guide_stroke_width = 1
plot_stroke_width = 2
leader_diameter = 6

[gauge]
outer_padding = 9
ring_thickness = 11
sweep_degrees = 262
segment_count = 33
segment_gap_degrees = 2.2
text_half_width = 42
value_bottom = 20
label_bottom = 48

[text]
preferred_padding = 2

[network_footer]
preferred_padding = 2

[layout_editor]
size_similarity_threshold = 5

[layout.5x3]
; 5" screen has 187 PPI and 384k px^2 of space
description = 5" 800x480 landscape
window = 800,480
cards = rows(columns:484(cpu,gpu),columns:416(network:370,storage:880,time:270))

[layout.3x5]
description = 5" 480x800 portrait
window = 480,800
cards = rows(cpu:481,gpu:413,columns:304(storage_throughput,network),columns:302(storage_usage:2,time))

[layout.4x1]
; 9" screen has 217 PPI, here it is sized to 360k px^2 of space
description = 9" 1920x480 screen
window = 1200,300
cards = columns(cpu,gpu,rows(columns:298(network,storage_throughput),columns:242(storage_usage:516,time:238)))

[dashboard]
outer_margin = 10
row_gap = 10
card_gap = 10

[card_style]
card_padding = 10
card_radius = 18
card_border = 1
header_height = 20
header_icon_size = 18
header_gap = 6
content_gap = 0
column_gap = 16
widget_line_gap = 2

[colors]
background_color = #000000
foreground_color = #FFFFFF
accent_color = #00BFFF
layout_guide_color = #FF6A00
active_edit_color = #FFFF00
panel_border_color = #EBEBEB
muted_text_color = #A5B4BE
track_color = #2D343A
panel_fill_color = #06080B
graph_background_color = #0A0C0F
graph_axis_color = #505860
graph_marker_color = #1C2228

[fonts]
title = Segoe UI Semibold,18,700
big = Segoe UI Semibold,40,700
value = Segoe UI Semibold,17,700
label = Segoe UI,15,400
text = Segoe UI,15,400
small = Segoe UI,13,400
footer = Segoe UI,13,400
clock_time = Segoe UI Semibold,40,700
clock_date = Segoe UI Semibold,17,700

[card.cpu]
title = CPU
icon = cpu
layout = rows(text(cpu.name), columns(gauge:5(cpu.load), metric_list:7(cpu.ram,board.temp.cpu=Temp,cpu.clock,board.fan.cpu=CPU Fan,board.fan.system=System Fan)))

[card.gpu]
title = GPU
icon = gpu
layout = rows(text(gpu.name), columns(gauge:5(gpu.load), metric_list:7(gpu.vram,gpu.temp,gpu.clock,gpu.fan)))

[card.network]
title = Network
icon = network
layout = rows(throughput:4(network.upload), throughput:4(network.download), network_footer)

[card.storage]
title = Storage
icon = storage
layout = columns(storage_throughput:330,storage_usage:478)

[card.storage_throughput]
title = Storage
icon = storage
layout = rows(throughput:4(storage.read), throughput:4(storage.write), vertical_spacer(network_footer))

[card.storage_usage]
layout = rows(drive_usage_list, vertical_spring)

[card.time]
title = Time
icon = time
layout = rows(vertical_spring, clock_time, clock_date, vertical_spring)
