; System Telemetry configuration.
; The application always starts from this embedded default config and then
; applies values from a config.ini file stored beside SystemTelemetry.exe.
; Use the tray or window "Save Config" action to write the current effective
; monitor placement, selected network adapter, and selected Gigabyte channel
; names back to that executable-side config.ini file.
;
; File format notes:
; - Section names use [brackets].
; - Each setting uses key = value.
; - Empty values usually mean automatic selection.
; - Comments begin with ; and are ignored by the app.

[display]
; Monitor identifier used to choose the target screen.
; Leave empty to keep the default monitor choice.
; The saved value is usually the monitor friendly name. If Windows needs a more
; specific identifier, the app may save a monitor device path instead.
monitor_name =

; Top-left dashboard position relative to the chosen monitor, in pixels.
; These values are updated by the "Save Config" action after moving the window.
position_x = 0
position_y = 0

[network]
; Preferred network adapter to display.
; Leave empty to auto-select the active routed connection.
; Saved values match the adapter alias or description reported by Windows.
adapter_name =

[storage]
; Comma-separated fixed drive letters to show in the storage usage list.
; Use letters without a trailing colon.
drives = C,D,E

[vendor.gigabyte]
; Preferred Gigabyte SIV fan channel name for CPU fan RPM.
; Leave empty to auto-select the channel named CPU, then the first working
; tachometer if no CPU-named channel is available.
fan_channel =

; Preferred Gigabyte SIV temperature channel name for CPU temperature.
; Leave empty to auto-select the channel named CPU, then the first available
; temperature sensor if no CPU-named channel is available.
temperature_channel =
