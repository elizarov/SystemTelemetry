[display]
monitor_name =
position_x = 0
position_y = 0

[network]
adapter_name =

[layout]
window = 800,480
outer_margin = 10
row_gap = 10
card_gap = 10
card_padding = 10
card_radius = 18
card_border = 1
header = 20,18,6
content_gap = 4
column_gap = 16
metric_row_height = 34
metric_label_width = 74
metric_value_gap = 8
metric_bar_height = 4
widget_line_gap = 8
drive_row_height = 25
drive_label_width = 28
drive_percent_width = 46
drive_free_width = 72
drive_bar_gap = 8
drive_value_gap = 10
drive_bar_height = 8
throughput_axis_width = 18
throughput_header_gap = 2
throughput_read_label_width = 54
throughput_write_label_width = 42
throughput_graph_height = 41
gauge_preferred_size = 120
rows = top*3(cpu,gpu), bottom*2(network*4,storage*9,time*3)

background_color = #000000
foreground_color = #FFFFFF
accent_color = #00BFFF
panel_border_color = #EBEBEB
muted_text_color = #A5B4BE
track_color = #2D343A
panel_fill_color = #06080B
graph_background_color = #0A0C0F
graph_grid_color = #2A3036
graph_axis_color = #505860

font.title = Segoe UI Semibold,18,700
font.big = Segoe UI Semibold,40,700
font.value = Segoe UI Semibold,17,700
font.label = Segoe UI,14,400
font.small = Segoe UI,12,400

[card.cpu]
title = CPU
icon = cpu
layout = stack(cpu_name, columns(gauge_cpu_load*5, metric_list_cpu(items=temp,clock,fan,ram)*7)*7)

[card.gpu]
title = GPU
icon = gpu
layout = stack(gpu_name, columns(gauge_gpu_load*5, metric_list_gpu(items=temp,clock,fan,vram)*7)*7)

[card.network]
title = Network
icon = network
layout = stack(throughput_upload*4, throughput_download*4, network_footer)

[card.storage]
title = Storage
icon = storage
layout = columns(stack(throughput_read*4, throughput_write*4, spacer)*5, stack_top(drive_usage_list(drives=C,D,E))*7)

[card.time]
title = Time
icon = time
layout = center(clock_time*5, clock_date*2)

