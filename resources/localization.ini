group = This item describes a configuration group and its matching dashboard highlight.
all_cards = Highlights every rendered card while this node is selected.
all_texts = Highlights editable text targets and text widgets while this node is selected.
dashboard_bounds = Highlights the dashboard bounds while this node is selected.
widget_class = Highlights every rendered widget of this type while this node is selected.
container = Highlights this container in the active layout while this node is selected.
card_instances = Highlights every rendered instance of this card while this node is selected.
dashboard_region = Highlights the matching dashboard region while this node is selected.

