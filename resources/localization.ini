config.metric_list.label_width = Width reserved for metric labels before the value and bar region begins.
config.metric_list.vertical_gap = Vertical spacing inserted between each visible metric row.
config.metric_list.bar_height = Height of the metric history fill bar drawn under each metric row.
config.drive_usage_list.label_gap = Gap between the drive label column and the read activity column.
config.drive_usage_list.rw_gap = Gap between the read and write activity columns.
config.drive_usage_list.bar_gap = Gap between the write activity column and the usage bar.
config.drive_usage_list.percent_gap = Gap between the usage bar and the percent-used text column.
config.drive_usage_list.activity_width = Width of each read and write activity column.
config.drive_usage_list.free_width = Width reserved for the free-space text column.
config.drive_usage_list.activity_segment_gap = Gap between stacked read or write activity segments.
config.drive_usage_list.header_gap = Vertical spacing between the drive list header and the first row.
config.drive_usage_list.row_gap = Vertical spacing inserted after each visible drive row.
config.drive_usage_list.bar_height = Height of the drive-usage fill bar in each row.
config.drive_usage_list.activity_segments = Number of stacked activity segments in the read and write columns.
config.throughput.axis_padding = Extra width added to the measured throughput axis label gutter.
config.throughput.header_gap = Vertical spacing between the throughput value header and the graph body.
config.throughput.guide_stroke_width = Stroke width used for throughput guide and axis lines.
config.throughput.plot_stroke_width = Stroke width used for throughput plot series lines.
config.throughput.leader_diameter = Diameter of the circular throughput leader marker.
config.gauge.outer_padding = Padding between the gauge ring and the outer widget bounds.
config.gauge.ring_thickness = Thickness of the gauge ring.
config.gauge.value_bottom = Bottom offset of the gauge value text from the gauge center.
config.gauge.label_bottom = Bottom offset of the gauge label text from the gauge center.
config.gauge.sweep_degrees = Total visible sweep of the gauge ring in degrees.
config.gauge.segment_gap_degrees = Angular gap inserted between neighboring gauge segments.
config.gauge.segment_count = Number of segments used to draw the gauge ring.
