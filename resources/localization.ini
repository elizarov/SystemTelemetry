[config]
metric_list.label_width = Width reserved for metric labels before the value and bar region begins.
metric_list.row_gap = Vertical spacing inserted around each visible metric row band.
metric_list.bar_height = Height of the metric history fill bar drawn under each metric row.
drive_usage_list.label_gap = Gap between the drive label column and the read activity column.
drive_usage_list.rw_gap = Gap between the read and write activity columns.
drive_usage_list.bar_gap = Gap between the write activity column and the usage bar.
drive_usage_list.percent_gap = Gap between the usage bar and the percent-used text column.
drive_usage_list.activity_width = Width of each read and write activity column.
drive_usage_list.free_width = Width reserved for the free-space text column.
drive_usage_list.activity_segment_gap = Gap between stacked read or write activity segments.
drive_usage_list.header_gap = Vertical spacing between the drive list header and the first row.
drive_usage_list.row_gap = Vertical spacing inserted after each visible drive row.
drive_usage_list.bar_height = Height of the drive-usage fill bar in each row.
drive_usage_list.activity_segments = Number of stacked activity segments in the read and write columns.
throughput.axis_padding = Extra width added to the measured throughput axis label gutter.
throughput.header_gap = Vertical spacing between the throughput value header and the graph body.
throughput.guide_stroke_width = Stroke width used for throughput guide and axis lines.
throughput.plot_stroke_width = Stroke width used for throughput plot series lines.
throughput.leader_diameter = Diameter of the circular throughput leader marker.
gauge.outer_padding = Padding between the gauge ring and the outer widget bounds.
gauge.ring_thickness = Thickness of the gauge ring.
gauge.value_bottom = Bottom offset of the gauge value text from the gauge center.
gauge.label_bottom = Bottom offset of the gauge label text from the gauge center.
gauge.sweep_degrees = Total visible sweep of the gauge ring in degrees.
gauge.segment_gap_degrees = Angular gap inserted between neighboring gauge segments.
gauge.segment_count = Number of segments used to draw the gauge ring.
text.bottom_gap = Extra fixed height reserved below a text widget's single text line.
network_footer.bottom_gap = Extra fixed height reserved below the network footer text line.
fonts.title = Font face, size, and weight used for card title text.
card.title = Title text shown in the card header.
fonts.big = Font face, size, and weight used for large gauge and primary numeric text.
fonts.value = Font face, size, and weight used for standard value text.
fonts.label = Font face, size, and weight used for primary row labels and percentages.
fonts.text = Font face, size, and weight used for text widgets.
fonts.small = Font face, size, and weight used for small secondary labels.
fonts.footer = Font face, size, and weight used for footer text such as the network footer.
fonts.clock_time = Font face, size, and weight used for the clock time line.
fonts.clock_date = Font face, size, and weight used for the clock date line.
card_style.card_padding = Shared inner padding between the card border and its header or content.
card_style.card_radius = Rounded corner radius used for the card shell.
card_style.card_border = Stroke width used to draw the card border.
card_style.header_icon_size = Size of the card header icon.
card_style.header_icon_gap = Gap between the card header icon and title text.
card_style.header_content_gap = Vertical gap between the card header and the content area when a header is present.
card_style.row_gap = Shared vertical spacing between stacked row children inside cards.
card_style.column_gap = Shared horizontal spacing between side-by-side column children inside cards.
dashboard.outer_margin = Shared inset between the app window edges and the dashboard content area.
dashboard.row_gap = Vertical spacing between stacked dashboard card containers.
dashboard.column_gap = Horizontal spacing between side-by-side dashboard card containers.
colors.background_color = Background color behind the whole dashboard window.
colors.foreground_color = Primary text and bright foreground color used for emphasized labels and values.
colors.icon_color = Header icon color used for card title icons.
colors.accent_color = Primary value color used for filled bars, gauges, and throughput plots.
colors.peak_ghost_color = Recent-peak marker color drawn over gauge segments and metric-list bars.
colors.layout_guide_color = Guide color used for hovered layout editing guides and outlines.
colors.active_edit_color = Active editing color used for dragged or tree-focused editing overlays.
colors.panel_border_color = Border color drawn around each card shell.
colors.muted_text_color = Secondary text color used for labels and supporting text.
colors.track_color = Background track color used behind gauge and bar fills.
colors.panel_fill_color = Fill color used inside each card shell.
colors.graph_background_color = Background color used behind throughput graph plots.
colors.graph_axis_color = Axis color used for throughput chart axes.
colors.graph_marker_color = Guide and marker color used for throughput chart grid lines.

[layout_edit]
section.metric_list = Shared sizing and spacing settings for metric list widgets.
section.drive_usage_list = Shared sizing and spacing settings for drive usage list widgets.
section.throughput = Shared sizing and spacing settings for throughput widgets.
section.gauge = Shared sizing and geometry settings for gauge widgets.
section.text = Shared sizing settings for text widgets.
section.network_footer = Shared sizing settings for the network footer widget.
section.dashboard = Shared spacing settings for the dashboard content area.
section.card_style = Shared shell and internal spacing settings for cards.
section.colors = Shared dashboard colors used across text, cards, guides, and charts.
section.fonts = Shared font families, sizes, and weights used across the dashboard.
section.metrics = Shared metric definitions used for metric-backed labels, units, scales, and formatting.
section.layout = Card placement structure for the active dashboard layout.
section.card = Widget and embedded-card structure for this card definition.
group.cards = Layout tree that arranges cards in the active dashboard layout.
group.layout = Layout tree that arranges widgets and embedded cards inside this card.
container.rows = Container that stacks its children vertically.
container.columns = Container that places its children side by side.
layout_guide = Relative size balance between the two neighboring layout children.
metric_definition = Metric scale, unit, label, and optional board sensor binding.
metric_list_reorder = Reorder the metrics configured in this metric list widget.
metric_list_add_row = Add a new row to this metric list widget.
clock_time_format = Format string used by this clock time widget.
clock_date_format = Format string used by this clock date widget.
