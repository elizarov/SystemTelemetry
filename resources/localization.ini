config.metric_list.label_width = Width reserved for metric labels before the value and bar region begins.
config.metric_list.row_gap = Vertical spacing inserted around each visible metric row band.
config.metric_list.bar_height = Height of the metric history fill bar drawn under each metric row.
config.drive_usage_list.label_gap = Gap between the drive label column and the read activity column.
config.drive_usage_list.rw_gap = Gap between the read and write activity columns.
config.drive_usage_list.bar_gap = Gap between the write activity column and the usage bar.
config.drive_usage_list.percent_gap = Gap between the usage bar and the percent-used text column.
config.drive_usage_list.activity_width = Width of each read and write activity column.
config.drive_usage_list.free_width = Width reserved for the free-space text column.
config.drive_usage_list.activity_segment_gap = Gap between stacked read or write activity segments.
config.drive_usage_list.header_gap = Vertical spacing between the drive list header and the first row.
config.drive_usage_list.row_gap = Vertical spacing inserted after each visible drive row.
config.drive_usage_list.bar_height = Height of the drive-usage fill bar in each row.
config.drive_usage_list.activity_segments = Number of stacked activity segments in the read and write columns.
config.throughput.axis_padding = Extra width added to the measured throughput axis label gutter.
config.throughput.header_gap = Vertical spacing between the throughput value header and the graph body.
config.throughput.guide_stroke_width = Stroke width used for throughput guide and axis lines.
config.throughput.plot_stroke_width = Stroke width used for throughput plot series lines.
config.throughput.leader_diameter = Diameter of the circular throughput leader marker.
config.gauge.outer_padding = Padding between the gauge ring and the outer widget bounds.
config.gauge.ring_thickness = Thickness of the gauge ring.
config.gauge.value_bottom = Bottom offset of the gauge value text from the gauge center.
config.gauge.label_bottom = Bottom offset of the gauge label text from the gauge center.
config.gauge.sweep_degrees = Total visible sweep of the gauge ring in degrees.
config.gauge.segment_gap_degrees = Angular gap inserted between neighboring gauge segments.
config.gauge.segment_count = Number of segments used to draw the gauge ring.
config.text.bottom_gap = Extra fixed height reserved below a text widget's single text line.
config.network_footer.bottom_gap = Extra fixed height reserved below the network footer text line.
config.fonts.title = Font face, size, and weight used for card title text.
config.fonts.big = Font face, size, and weight used for large gauge and primary numeric text.
config.fonts.value = Font face, size, and weight used for standard value text.
config.fonts.label = Font face, size, and weight used for primary row labels and percentages.
config.fonts.text = Font face, size, and weight used for text widgets.
config.fonts.small = Font face, size, and weight used for small secondary labels.
config.fonts.footer = Font face, size, and weight used for footer text such as the network footer.
config.fonts.clock_time = Font face, size, and weight used for the clock time line.
config.fonts.clock_date = Font face, size, and weight used for the clock date line.
config.card_style.card_padding = Shared inner padding between the card border and its header or content.
config.card_style.card_radius = Rounded corner radius used for the card shell.
config.card_style.card_border = Stroke width used to draw the card border.
config.card_style.header_icon_size = Size of the card header icon.
config.card_style.header_icon_gap = Gap between the card header icon and title text.
config.card_style.header_content_gap = Vertical gap between the card header and the content area when a header is present.
config.card_style.row_gap = Shared vertical spacing between stacked row children inside cards.
config.card_style.column_gap = Shared horizontal spacing between side-by-side column children inside cards.
config.dashboard.outer_margin = Shared inset between the app window edges and the dashboard content area.
config.dashboard.row_gap = Vertical spacing between stacked dashboard card containers.
config.dashboard.column_gap = Horizontal spacing between side-by-side dashboard card containers.
config.colors.background_color = Background color behind the whole dashboard window.
config.colors.foreground_color = Primary text and bright foreground color used for emphasized labels and values.
config.colors.accent_color = Primary value color used for filled bars, gauges, and throughput plots.
config.colors.layout_guide_color = Guide color used for hovered layout editing guides and outlines.
config.colors.active_edit_color = Active editing color used for dragged or tree-focused editing overlays.
config.colors.panel_border_color = Border color drawn around each card shell.
config.colors.muted_text_color = Secondary text color used for labels and supporting text.
config.colors.track_color = Background track color used behind gauge and bar fills.
config.colors.panel_fill_color = Fill color used inside each card shell.
config.colors.graph_background_color = Background color used behind throughput graph plots.
config.colors.graph_axis_color = Axis color used for throughput chart axes.
config.colors.graph_marker_color = Guide and marker color used for throughput chart grid lines.
layout_edit.section.metric_list = Shared sizing and spacing settings for metric list widgets.
layout_edit.section.drive_usage_list = Shared sizing and spacing settings for drive usage list widgets.
layout_edit.section.throughput = Shared sizing and spacing settings for throughput widgets.
layout_edit.section.gauge = Shared sizing and geometry settings for gauge widgets.
layout_edit.section.text = Shared sizing settings for text widgets.
layout_edit.section.network_footer = Shared sizing settings for the network footer widget.
layout_edit.section.dashboard = Shared spacing settings for the dashboard content area.
layout_edit.section.card_style = Shared shell and internal spacing settings for cards.
layout_edit.section.colors = Shared dashboard colors used across text, cards, guides, and charts.
layout_edit.section.fonts = Shared font families, sizes, and weights used across the dashboard.
layout_edit.section.layout = Card placement structure for the active dashboard layout.
layout_edit.section.card = Widget and embedded-card structure for this card definition.
layout_edit.group.cards = Layout tree that arranges cards in the active dashboard layout.
layout_edit.group.layout = Layout tree that arranges widgets and embedded cards inside this card.
layout_edit.container.rows = Container that stacks its children vertically.
layout_edit.container.columns = Container that places its children side by side.
layout_edit.layout_guide = Relative size balance between the two neighboring layout children.
