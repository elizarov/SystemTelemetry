name: Validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  format-lint-tidy:
    name: Validation
    runs-on: windows-2025-vs2026
    timeout-minutes: 240

    env:
      SYSTEMTELEMETRY_TIDY_TIMEOUT_SECONDS: 1800
      SYSTEMTELEMETRY_TIDY_MAX_PARALLEL: 4
      SYSTEMTELEMETRY_CACHE_ROOT: ${{ github.workspace }}\.github-cache\SystemTelemetry

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore vcpkg caches
        id: vcpkg-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ github.workspace }}\.github-cache\SystemTelemetry\vcpkg\downloads
            ${{ github.workspace }}\.github-cache\SystemTelemetry\vcpkg\registries
          key: vcpkg-windows-2025-vs2026-${{ hashFiles('vcpkg.json', 'build.cmd', '.github/workflows/validation.yml') }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-windows-2025-vs2026-${{ hashFiles('vcpkg.json', 'build.cmd', '.github/workflows/validation.yml') }}-
            vcpkg-windows-2025-vs2026-

      - name: Check format
        shell: cmd
        run: format.cmd

      - name: Build
        shell: cmd
        run: build.cmd

      - name: Run tests
        shell: cmd
        run: test.cmd

      - name: Run lint tidy
        shell: cmd
        run: lint.cmd tidy

      - name: Upload SystemTelemetry executable
        uses: actions/upload-artifact@v4
        with:
          name: SystemTelemetry-exe
          path: build/SystemTelemetry.exe
          if-no-files-found: error

      - name: Upload clang-tidy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: build/clang_tidy_report.txt
          if-no-files-found: ignore

      - name: Save vcpkg caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ github.workspace }}\.github-cache\SystemTelemetry\vcpkg\downloads
            ${{ github.workspace }}\.github-cache\SystemTelemetry\vcpkg\registries
          key: ${{ steps.vcpkg-cache-restore.outputs.cache-primary-key }}
