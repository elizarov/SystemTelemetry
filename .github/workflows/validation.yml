name: Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validation:
    name: Validation
    runs-on: windows-2025-vs2026
    timeout-minutes: 240

    env:
      CASEDASH_TIDY_TIMEOUT_SECONDS: 1800
      CASEDASH_TIDY_MAX_PARALLEL: 4
      CASEDASH_CACHE_ROOT: ${{ github.workspace }}\.github-cache\CaseDash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore vcpkg caches
        id: vcpkg-cache-restore
        uses: actions/cache/restore@v5
        continue-on-error: true
        with:
          path: |
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\downloads
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\registries
          key: vcpkg-windows-2025-vs2026-${{ hashFiles('vcpkg.json', 'build.cmd', '.github/workflows/validation.yml') }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-windows-2025-vs2026-${{ hashFiles('vcpkg.json', 'build.cmd', '.github/workflows/validation.yml') }}-
            vcpkg-windows-2025-vs2026-

      - name: Check format
        shell: cmd
        run: format.cmd

      - name: Build
        shell: cmd
        run: build.cmd /benchmarks

      - name: Run tests
        shell: cmd
        run: test.cmd

      - name: Build MSI
        shell: cmd
        run: package.cmd

      - name: Run unused include lint
        shell: cmd
        run: lint.cmd includes

      - name: Upload CaseDash executable
        uses: actions/upload-artifact@v7
        with:
          name: CaseDash-exe
          path: build/CaseDash.exe
          if-no-files-found: error

      - name: Upload CaseDash MSI
        uses: actions/upload-artifact@v7
        with:
          name: CaseDash-msi
          path: |
            build/CaseDash-*.msi
            build/CaseDash-*.msi.sha256
          if-no-files-found: error

      - name: Upload clang include-cleaner report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clang-include-cleaner-report
          path: build/clang_include_cleaner_report.txt
          if-no-files-found: ignore

      - name: Save vcpkg caches
        if: always()
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: |
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\downloads
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\registries
          key: vcpkg-windows-2025-vs2026-${{ hashFiles('vcpkg.json', 'build.cmd', '.github/workflows/validation.yml') }}-${{ github.run_id }}
