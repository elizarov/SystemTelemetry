name: Pages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit to build'
        required: false
        default: main
        type: string

jobs:
  build-pages:
    name: Build Pages
    runs-on: windows-2025-vs2026
    timeout-minutes: 240
    permissions:
      contents: read

    env:
      CASEDASH_CACHE_ROOT: ${{ github.workspace }}\.github-cache\CaseDash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Restore vcpkg caches
        id: vcpkg-cache-restore
        uses: actions/cache/restore@v5
        continue-on-error: true
        with:
          path: |
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\downloads
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\registries
          key: vcpkg-windows-2025-vs2026-pages-${{ hashFiles('vcpkg.json', 'build.cmd', 'web-build.cmd', '.github/workflows/pages.yml') }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-windows-2025-vs2026-pages-${{ hashFiles('vcpkg.json', 'build.cmd', 'web-build.cmd', '.github/workflows/pages.yml') }}-
            vcpkg-windows-2025-vs2026-

      - name: Build website
        shell: cmd
        run: web-build.cmd

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

      - name: Save vcpkg caches
        if: always()
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: |
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\downloads
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\registries
          key: vcpkg-windows-2025-vs2026-pages-${{ hashFiles('vcpkg.json', 'build.cmd', 'web-build.cmd', '.github/workflows/pages.yml') }}-${{ github.run_id }}

  deploy-pages:
    name: Deploy Pages
    needs: build-pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
