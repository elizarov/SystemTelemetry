name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, such as v0.1'
        required: true
        type: string

jobs:
  release:
    name: Release
    runs-on: windows-2025-vs2026
    timeout-minutes: 240
    permissions:
      contents: write

    env:
      CASEDASH_CACHE_ROOT: ${{ github.workspace }}\.github-cache\CaseDash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Validate release tag
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          $expectedTag = "v$version"
          $actualTag = "${{ inputs.tag || github.ref_name }}"
          if ($actualTag -ne $expectedTag) {
            throw "Release tag '$actualTag' does not match VERSION '$version' (expected '$expectedTag')."
          }
          "CASE_DASH_RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CASE_DASH_RELEASE_TAG=$actualTag" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Read release notes
        shell: pwsh
        run: .\tools\release_changelog.ps1 -Mode Extract -Version $env:CASE_DASH_RELEASE_VERSION -OutputPath build\release-notes.md

      - name: Restore vcpkg caches
        id: vcpkg-cache-restore
        uses: actions/cache/restore@v5
        continue-on-error: true
        with:
          path: |
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\downloads
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\registries
          key: vcpkg-windows-2025-vs2026-release-${{ hashFiles('vcpkg.json', 'build.cmd', '.github/workflows/release.yml') }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-windows-2025-vs2026-release-${{ hashFiles('vcpkg.json', 'build.cmd', '.github/workflows/release.yml') }}-
            vcpkg-windows-2025-vs2026-

      - name: Check format
        shell: cmd
        run: format.cmd

      - name: Run lint
        shell: cmd
        run: lint.cmd

      - name: Build
        shell: cmd
        run: build.cmd /benchmarks

      - name: Run tests
        shell: cmd
        run: test.cmd

      - name: Build MSI
        shell: cmd
        run: package.cmd

      - name: Package release
        shell: pwsh
        run: |
          $packageDir = Join-Path $env:RUNNER_TEMP "CaseDash-$env:CASE_DASH_RELEASE_VERSION"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item build\CaseDash.exe $packageDir
          Copy-Item LICENSE $packageDir
          Copy-Item README.md $packageDir
          Compress-Archive -Path "$packageDir\*" -DestinationPath "build\CaseDash-$env:CASE_DASH_RELEASE_VERSION.zip" -Force
          Get-FileHash "build\CaseDash.exe" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  CaseDash.exe" } |
            Set-Content "build\CaseDash.exe.sha256"
          Get-FileHash "build\CaseDash-$env:CASE_DASH_RELEASE_VERSION.zip" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  CaseDash-$env:CASE_DASH_RELEASE_VERSION.zip" } |
            Set-Content "build\CaseDash-$env:CASE_DASH_RELEASE_VERSION.zip.sha256"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:CASE_DASH_RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $env:CASE_DASH_RELEASE_TAG --yes
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
          gh release create $env:CASE_DASH_RELEASE_TAG `
            build\CaseDash.exe `
            build\CaseDash.exe.sha256 `
            "build\CaseDash-$env:CASE_DASH_RELEASE_VERSION.zip" `
            "build\CaseDash-$env:CASE_DASH_RELEASE_VERSION.zip.sha256" `
            "build\CaseDash-$env:CASE_DASH_RELEASE_VERSION.msi" `
            "build\CaseDash-$env:CASE_DASH_RELEASE_VERSION.msi.sha256" `
            --title "CaseDash $env:CASE_DASH_RELEASE_VERSION" `
            --notes-file build\release-notes.md

      - name: Save vcpkg caches
        if: always()
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: |
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\downloads
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\registries
          key: vcpkg-windows-2025-vs2026-release-${{ hashFiles('vcpkg.json', 'build.cmd', '.github/workflows/release.yml') }}-${{ github.run_id }}

  build-pages:
    name: Build Pages
    needs: release
    runs-on: windows-2025-vs2026
    timeout-minutes: 240
    permissions:
      contents: read

    env:
      CASEDASH_CACHE_ROOT: ${{ github.workspace }}\.github-cache\CaseDash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Restore vcpkg caches
        id: vcpkg-cache-restore
        uses: actions/cache/restore@v5
        continue-on-error: true
        with:
          path: |
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\downloads
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\registries
          key: vcpkg-windows-2025-vs2026-release-pages-${{ hashFiles('vcpkg.json', 'build.cmd', 'web-build.cmd', '.github/workflows/release.yml') }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-windows-2025-vs2026-release-pages-${{ hashFiles('vcpkg.json', 'build.cmd', 'web-build.cmd', '.github/workflows/release.yml') }}-
            vcpkg-windows-2025-vs2026-

      - name: Build website
        shell: cmd
        run: web-build.cmd

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

      - name: Save vcpkg caches
        if: always()
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: |
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\downloads
            ${{ github.workspace }}\.github-cache\CaseDash\vcpkg\registries
          key: vcpkg-windows-2025-vs2026-release-pages-${{ hashFiles('vcpkg.json', 'build.cmd', 'web-build.cmd', '.github/workflows/release.yml') }}-${{ github.run_id }}

  deploy-pages:
    name: Deploy Pages
    needs: build-pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
