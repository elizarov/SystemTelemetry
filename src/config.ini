; System Telemetry dashboard configuration example.
; Keep this file in sync with supported configuration fields.
; Runtime builds read and write config.ini from the folder they are started from.
; This file remains an example template in the source tree.
; monitor_name matches the display identifier used by the app. It may be a
; friendly display name or, when needed for uniqueness, an internal device path.
; position_x and position_y are the window's relative top-left coordinates on that monitor.

[display]
monitor_name =
position_x = 0
position_y = 0

[network]
; Leave empty to auto-select the first active non-loopback adapter.
adapter_name =

[storage]
; Comma-separated fixed drives to render.
drives = C,D,E

[sensors]
; Binding format:
; metric = namespace-or-auto|matchField|matchValue|valueField
; Use "auto" to try root\LibreHardwareMonitor then root\OpenHardwareMonitor.
; Examples:
; cpu_temp = auto|Identifier|/amdcpu/0/temperature/0|Value
; cpu_power = auto|Name|CPU Package|Value
; cpu_fan = auto|Name|CPU Fan|Value
; gpu_temp = auto|Name|GPU Core|Value
; gpu_power = auto|Name|GPU Power|Value
; gpu_clock = auto|Name|GPU Core|Value
; gpu_fan = auto|Name|GPU Fan|Value
