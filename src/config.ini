; System Telemetry dashboard configuration example.
; Keep this file in sync with supported configuration fields.
; Runtime builds read and write config.ini from the executable folder.
; This file remains an example template in the source tree.
; monitor_name matches the display identifier used by the app. It may be a
; friendly display name or, when needed for uniqueness, an internal device path.
; position_x and position_y are the window's relative top-left coordinates on that monitor.

[display]
monitor_name =
position_x = 0
position_y = 0

[network]
; Leave empty to auto-select the active adapter that best looks like the routed network connection.
adapter_name =

[storage]
; Comma-separated fixed drives to render.
drives = C,D,E

[vendor.gigabyte]
; Leave empty to auto-pick the CPU-named fan channel, then the first working tachometer.
fan_channel =
; Leave empty to auto-pick the CPU-named temperature channel, then the first available sensor.
temperature_channel =
