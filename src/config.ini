; System Telemetry dashboard configuration
; monitor_name matches the display's friendly monitor name as reported by Windows.

[display]
monitor_name =

[network]
; Leave empty to auto-select the first active non-loopback adapter.
adapter_name =

[storage]
; Comma-separated fixed drives to render.
drives = C,D,E

[sensors]
; Binding format:
; metric = namespace-or-auto|matchField|matchValue|valueField
; Use "auto" to try root\LibreHardwareMonitor then root\OpenHardwareMonitor.
; Examples:
; cpu_temp = auto|Identifier|/amdcpu/0/temperature/0|Value
; cpu_power = auto|Name|CPU Package|Value
; cpu_fan = auto|Name|CPU Fan|Value
; gpu_temp = auto|Name|GPU Core|Value
; gpu_power = auto|Name|GPU Power|Value
; gpu_clock = auto|Name|GPU Core|Value
; gpu_fan = auto|Name|GPU Fan|Value
